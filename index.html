<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    <title>Research Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #wrapper { display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a73e8; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .viewer-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; /* Crucial for iPhone */ }
        iframe { width: 100%; height: 100%; border: none; }
        .export-btn { background: #34a853; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="wrapper">
    <header>
        <span id="status">Reading Session Active</span>
        <button class="export-btn" onclick="exportLog()">Download Log</button>
    </header>

    <div class="viewer-container">
        <iframe id="pdf-viewer" src=""></iframe>
    </div>
</div>

<script>
    // Update these for your GitHub
    const GITHUB_USER = "YOUR_USERNAME"; 
    const REPO_NAME = "YOUR_REPO";
    const PDF_NAME = "research.pdf";

    const pdfUrl = `https://${GITHUB_USER}.github.io/${REPO_NAME}/${PDF_NAME}`;
    // We add a 'cache-buster' to ensure iPhone loads the freshest version
    const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true&cb=${Date.now()}`;
    
    document.getElementById('pdf-viewer').src = viewerUrl;

    // Pulse Log every 15 seconds
    setInterval(() => {
        let logs = JSON.parse(localStorage.getItem('thesis_logs') || '[]');
        logs.push({ t: new Date().toISOString(), e: "HEARTBEAT" });
        localStorage.setItem('thesis_logs', JSON.stringify(logs));
        console.log("Heartbeat saved.");
    }, 15000);

    function exportLog() {
        const logs = localStorage.getItem('thesis_logs');
        const blob = new Blob([logs], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Research_Log_${new Date().getTime()}.json`;
        a.click();
    }
</script>
</body>
</html>
